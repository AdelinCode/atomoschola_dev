<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Commission Dashboard - Atomo Schola</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/dropdown.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .commission-container {
            max-width: 1400px;
            margin: 80px auto 40px;
            padding: 20px;
        }
        .commission-header {
            margin-bottom: 30px;
        }
        .dashboard-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .dashboard-card h3 {
            margin-bottom: 16px;
            color: #6f42c1;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }
        .tab.active {
            color: #6f42c1;
            border-bottom-color: #6f42c1;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .vote-buttons {
            display: flex;
            gap: 12px;
        }
        .vote-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .vote-btn.yes {
            background: #28a745;
            color: white;
        }
        .vote-btn.yes:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        .vote-btn.no {
            background: #dc3545;
            color: white;
        }
        .vote-btn.no:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        .edit-detail {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #6f42c1;
        }
        .approved-edit-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.jpeg" alt="Atomo Schola" style="height: 50px; vertical-align: middle;">
                        <span>Atomo Schola</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <!-- Dynamic navigation will be inserted here -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Editor Commission Dashboard Content -->
    <main class="commission-container">
        <div class="commission-header">
            <h1><i class="fas fa-pen-fancy"></i> Editor Commission Dashboard</h1>
            <p>Vote on edit proposals and manage approved edits</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending')">
                <i class="fas fa-vote-yea"></i> Pending Edit Proposals
                <span id="pendingBadge" style="background: #6f42c1; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px;">0</span>
            </button>
            <button class="tab" onclick="switchTab('lessons')">
                <i class="fas fa-book"></i> Pending Lessons
                <span id="lessonsBadge" style="background: #f57c00; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px;">0</span>
            </button>
            <button class="tab" onclick="switchTab('approved')">
                <i class="fas fa-check-circle"></i> Approved Edits
                <span id="approvedBadge" style="background: #28a745; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px;">0</span>
            </button>
        </div>

        <!-- Pending Votes Tab -->
        <div id="pendingTab" class="tab-content active">
            <div class="dashboard-card">
                <div id="pendingProposalsList" style="max-height: 600px; overflow-y: auto;">
                    <p style="text-align: center; color: #6c757d;">Loading proposals...</p>
                </div>
            </div>
        </div>

        <!-- Pending Lessons Tab -->
        <div id="lessonsTab" class="tab-content">
            <div class="dashboard-card">
                <div id="pendingLessonsList" style="max-height: 600px; overflow-y: auto;">
                    <p style="text-align: center; color: #6c757d;">Loading lessons...</p>
                </div>
            </div>
        </div>

        <!-- Approved Edits Tab -->
        <div id="approvedTab" class="tab-content">
            <div class="dashboard-card">
                <div id="approvedEditsList" style="max-height: 600px; overflow-y: auto;">
                    <p style="text-align: center; color: #6c757d;">Loading approved edits...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/editor-commission-dashboard.js"></script>
</body>
</html>
