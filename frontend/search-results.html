<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomo Schola</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/dropdown.css">
    <link rel="stylesheet" href="styles/search.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .search-results-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .search-header {
            margin-bottom: 30px;
        }
        
        .search-query {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .search-stats {
            color: #6c757d;
            font-size: 14px;
        }
        
        .results-section {
            margin-bottom: 40px;
        }
        
        .results-section h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }
        
        .results-grid {
            display: grid;
            gap: 20px;
        }
        
        .result-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .result-card:hover {
            border-color: #007bff;
            box-shadow: 0 4px 12px rgba(0,123,255,0.15);
        }
        
        .result-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }
        
        .result-icon {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .result-content {
            flex: 1;
        }
        
        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .result-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6c757d;
        }
        
        .result-description {
            color: #6c757d;
            line-height: 1.5;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .no-results i {
            font-size: 48px;
            margin-bottom: 20px;
            color: #dee2e6;
        }
        
        @media (max-width: 768px) {
            .search-results-page {
                padding: 0 15px;
            }
            
            .result-header {
                gap: 12px;
            }
            
            .result-icon {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
            
            .result-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.jpeg" alt="Atomo Schola" style="height: 50px; vertical-align: middle;">
                        <span>Atomo Schola</span>
                    </a>
                </div>

                <div class="search-bar">
                    <input type="text" placeholder="Search for lessons, topics..." id="searchInput">
                    <button class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <nav class="nav-menu" id="navMenu">
                    <!-- Dynamic navigation will be inserted here -->
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="search-results-page">
            <div class="search-header">
                <h1 class="search-query">Search Results</h1>
                <div class="search-stats" id="searchStats">Searching...</div>
            </div>

            <div id="searchResultsContainer">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: #007bff;"></i>
                    <p style="margin-top: 15px; color: #6c757d;">Loading results...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/search.js"></script>
    <script src="scripts/main.js"></script>
    <script>
        // Search results page specific functionality
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            if (!query) {
                window.location.href = 'index.html';
                return;
            }
            
            // Update search input
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = query;
            }
            
            // Update page title and header
            document.title = `"${query}" - Search Results - Atomo Schola`;
            document.querySelector('.search-query').textContent = `Results for "${query}"`;
            
            // Perform search
            await loadSearchResults(query);
        });
        
        async function loadSearchResults(query) {
            try {
                const apiUrl = window.CONFIG ? window.CONFIG.API_BASE_URL : 'http://localhost:5000/api';
                const response = await fetch(`${apiUrl}/search?q=${encodeURIComponent(query)}&limit=50`);
                const data = await response.json();
                
                if (data.success) {
                    displayFullResults(data.data, query);
                } else {
                    showError('Search failed');
                }
            } catch (error) {
                console.error('Search error:', error);
                showError('Search unavailable');
            }
        }
        
        function displayFullResults(results, query) {
            const { lessons, subjects, domains, categories } = results;
            const totalResults = lessons.length + subjects.length + domains.length + categories.length;
            
            // Update stats
            document.getElementById('searchStats').textContent = 
                totalResults > 0 ? `Found ${totalResults} results` : 'No results found';
            
            const container = document.getElementById('searchResultsContainer');
            
            if (totalResults === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No results found for "${query}"</h3>
                        <p>Try different keywords or check your spelling</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            // Lessons
            if (lessons.length > 0) {
                html += `
                    <div class="results-section">
                        <h3><i class="fas fa-book"></i> Lessons (${lessons.length})</h3>
                        <div class="results-grid">
                `;
                
                lessons.forEach(lesson => {
                    const stars = '★'.repeat(Math.round(lesson.averageRating || 0)) + '☆'.repeat(5 - Math.round(lesson.averageRating || 0));
                    html += `
                        <div class="result-card" onclick="window.location.href='lesson.html?id=${lesson._id}'">
                            <div class="result-header">
                                <div class="result-icon">
                                    <i class="fas fa-${getTypeIcon(lesson.type)}"></i>
                                </div>
                                <div class="result-content">
                                    <div class="result-title">${highlightMatch(lesson.title, query)}</div>
                                    <div class="result-meta">
                                        <span><i class="fas fa-layer-group"></i> ${lesson.subject} → ${lesson.domain} → ${lesson.category}</span>
                                        <span><i class="fas fa-star"></i> ${stars} ${(lesson.averageRating || 0).toFixed(1)}</span>
                                        ${lesson.isPremium ? '<span style="color: #ffc107;"><i class="fas fa-crown"></i> Premium</span>' : ''}
                                    </div>
                                    <div class="result-description">${highlightMatch(lesson.description, query)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            // Subjects
            if (subjects.length > 0) {
                html += `
                    <div class="results-section">
                        <h3><i class="fas fa-graduation-cap"></i> Subjects (${subjects.length})</h3>
                        <div class="results-grid">
                `;
                
                subjects.forEach(subject => {
                    html += `
                        <div class="result-card" onclick="window.location.href='subject.html?subject=${subject.slug}'">
                            <div class="result-header">
                                <div class="result-icon">
                                    <i class="${subject.icon}"></i>
                                </div>
                                <div class="result-content">
                                    <div class="result-title">${highlightMatch(subject.name, query)}</div>
                                    <div class="result-description">${highlightMatch(subject.description, query)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            // Domains and Categories
            if (domains.length > 0 || categories.length > 0) {
                html += `
                    <div class="results-section">
                        <h3><i class="fas fa-layer-group"></i> Topics (${domains.length + categories.length})</h3>
                        <div class="results-grid">
                `;
                
                domains.forEach(domain => {
                    html += `
                        <div class="result-card" onclick="window.location.href='subject.html?subject=${domain.subjectSlug}'">
                            <div class="result-header">
                                <div class="result-icon">
                                    <i class="fas fa-layer-group"></i>
                                </div>
                                <div class="result-content">
                                    <div class="result-title">${highlightMatch(domain.name, query)} <small style="color: #6c757d;">(Domain)</small></div>
                                    <div class="result-meta">
                                        <span><i class="fas fa-graduation-cap"></i> ${domain.subject}</span>
                                    </div>
                                    <div class="result-description">${highlightMatch(domain.description, query)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                categories.forEach(category => {
                    html += `
                        <div class="result-card" onclick="window.location.href='subject.html?subject=${category.subjectSlug}'">
                            <div class="result-header">
                                <div class="result-icon">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <div class="result-content">
                                    <div class="result-title">${highlightMatch(category.name, query)} <small style="color: #6c757d;">(Category)</small></div>
                                    <div class="result-meta">
                                        <span><i class="fas fa-layer-group"></i> ${category.subject} → ${category.domain}</span>
                                    </div>
                                    <div class="result-description">${highlightMatch(category.description, query)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            container.innerHTML = html;
        }
        
        function showError(message) {
            document.getElementById('searchResultsContainer').innerHTML = `
                <div class="no-results">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
