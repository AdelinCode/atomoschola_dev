<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Atomo Schola</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/dropdown.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .staff-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
        }
        .staff-header {
            margin-bottom: 30px;
        }
        .dashboard-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .dashboard-card h3 {
            margin-bottom: 16px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.jpeg" alt="Atomo Schola" style="height: 50px; vertical-align: middle;">
                        <span>Atomo Schola</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <!-- Dynamic navigation will be inserted here -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Staff Dashboard Content -->
    <main class="staff-container">
        <div class="staff-header">
            <h1><i class="fas fa-tasks"></i> Staff Dashboard</h1>
            <p>Review and manage pending content requests</p>
        </div>

        <!-- Pending Requests -->
        <div class="dashboard-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="margin: 0;"><i class="fas fa-clock"></i> Pending Requests</h3>
                <span id="pendingCount" style="background: #ffc107; color: #000; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 14px;">0</span>
            </div>
            <div id="pendingRequestsList" style="max-height: 600px; overflow-y: auto;">
                <p style="text-align: center; color: #6c757d;">Loading requests...</p>
            </div>
        </div>
    </main>

    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/staff-dashboard.js"></script>
</body>
</html>
