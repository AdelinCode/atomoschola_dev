<!DOCTYPE html>
<html lang="en">
<head>
    <script>!function(){var t=localStorage.getItem('atomo-schola-theme')||( window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.className+=' dark-mode';}();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Atomo Schola</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/dark-mode.css">
</head>
<body class="auth-body">
    <button class="auth-theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>
    <script>
        (function(){
            var btn = document.getElementById('themeToggle');
            var isDark = document.body.classList.contains('dark-mode') || document.documentElement.classList.contains('dark-mode');
            if(isDark){ document.body.classList.add('dark-mode'); btn.innerHTML='<i class="fas fa-sun"></i>'; }
            btn.addEventListener('click', function(){
                var dark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('atomo-schola-theme', dark ? 'dark' : 'light');
                btn.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        })();
    </script>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <img src="logo.jpeg" alt="Atomo Schola" style="height: 50px;">
                    <span>Atomo Schola</span>
                </div>
                <h1>Forgot Password?</h1>
                <p>Submit a password reset request to an administrator</p>
            </div>
            
            <form class="auth-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="reason">Reason (Optional)</label>
                    <textarea id="reason" name="reason" rows="3" placeholder="Why do you need to reset your password?"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-paper-plane"></i>
                    Submit Request
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Remember your password? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>
    
    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/theme-manager.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const reason = document.getElementById('reason').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            
            try {
                const response = await fetch(`${window.CONFIG.API_BASE_URL}/password-reset/request`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, reason })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
                }
            } catch (error) {
                showMessage('An error occurred. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
            }
        });
        
        function showMessage(message, type = 'info') {
            const existingMessage = document.querySelector('.auth-message');
            if (existingMessage) {
                existingMessage.remove();
            }
            
            const messageEl = document.createElement('div');
            messageEl.className = `auth-message auth-message-${type}`;
            messageEl.textContent = message;
            
            messageEl.style.cssText = `
                padding: 12px 16px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
                font-weight: 500;
                text-align: center;
                animation: slideIn 0.3s ease;
            `;
            
            switch (type) {
                case 'success':
                    messageEl.style.background = '#d4edda';
                    messageEl.style.color = '#155724';
                    messageEl.style.border = '1px solid #c3e6cb';
                    break;
                case 'error':
                    messageEl.style.background = '#f8d7da';
                    messageEl.style.color = '#721c24';
                    messageEl.style.border = '1px solid #f5c6cb';
                    break;
            }
            
            const form = document.querySelector('.auth-form');
            if (form) {
                form.parentNode.insertBefore(messageEl, form);
            }
        }
    </script>
</body>
</html>
