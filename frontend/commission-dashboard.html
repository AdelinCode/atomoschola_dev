<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Dashboard - Atomo Schola</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/dropdown.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .commission-container {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
        }
        .commission-header {
            margin-bottom: 30px;
        }
        .dashboard-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .dashboard-card h3 {
            margin-bottom: 16px;
            color: #6f42c1;
        }
        .vote-buttons {
            display: flex;
            gap: 12px;
        }
        .vote-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .vote-btn.yes {
            background: #28a745;
            color: white;
        }
        .vote-btn.yes:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        .vote-btn.no {
            background: #dc3545;
            color: white;
        }
        .vote-btn.no:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        .vote-progress {
            margin-top: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .vote-bar {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .vote-bar-item {
            height: 8px;
            flex: 1;
            border-radius: 4px;
            background: #e0e0e0;
        }
        .vote-bar-item.voted {
            background: #6f42c1;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.jpeg" alt="Atomo Schola" style="height: 50px; vertical-align: middle;">
                        <span>Atomo Schola</span>
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <!-- Dynamic navigation will be inserted here -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Commission Dashboard Content -->
    <main class="commission-container">
        <div class="commission-header">
            <h1><i class="fas fa-gavel"></i> Commission Dashboard</h1>
            <p>Vote on pending content requests</p>
        </div>

        <!-- Pending Requests for Voting -->
        <div class="dashboard-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="margin: 0;"><i class="fas fa-vote-yea"></i> Pending Votes</h3>
                <span id="pendingCount" style="background: #6f42c1; color: white; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 14px;">0</span>
            </div>
            <div id="pendingRequestsList" style="max-height: 600px; overflow-y: auto;">
                <p style="text-align: center; color: #6c757d;">Loading requests...</p>
            </div>
        </div>
    </main>

    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/commission-dashboard.js"></script>
</body>
</html>
